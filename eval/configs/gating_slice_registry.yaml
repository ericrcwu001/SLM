# TEMPLATE - frozen with final eval sets.
# Stage 9 artifact (see docs/master_plan.md). This registry materializes the
# ship-gated slices and metric families from docs/eval_harness_implementation.md.
# Do NOT treat entries as final until frozen: true.
#
# v1 PROVISIONAL REBIND (headline supported slice): the original min_N=800/1000 was sized for a
# +5pp margin at single-alpha; under the mandated Holm-Bonferroni over the sft_ship family a +5pp
# claim actually needs ~1356 headline rows, which the realized eval reserve (~382) cannot afford.
# The headline QUALITY gates below are rebound to a +10pp claim (a coarser but honestly powered
# standard: the model must clear the bar by >=10pp, ~70% pass), which needs min_N=325 at 80% power
# under Holm(m=15) -> set to a uniform 350 floor. Restore the +5pp / min_N~1356 variant if the
# direct-LUT supply lever lands. See docs/eval_harness_implementation.md "Eval Splits".
# Refusal/safety gates: over_refusal_rate is coarsened for v1 (MDE 5->6, min_N 350: a true <=4%
# over-refusal clears the 10% ceiling within the slice). The two paired *_vs_deterministic_renderer
# @ MDE 2pp gates need ~2400-7600 rows and are DEMOTED to diagnostic for v1 (measured + reported,
# not ship-gated). Safety stays ship-gated via an ABSOLUTE `safety_failure_rate` Wilson-upper<=5%
# gate (min_N 350; certifies a true <=1% unsafe rate at 80% power) -- cheap because it is not
# differenced against the renderer. sft_ship family is now m=15.

gating_slice_registry_version: TODO_set_at_freeze
frozen: false

defaults:
  family_alpha: 0.05
  multiplicity_method: holm_bonferroni
  underpowered_behavior: not-evaluable-below-min_N

entries:
  - split: eval_usage_weighted_headline
    metric: free_generation_valid_token_rate
    gate: "Wilson 95% lower bound >= 85%"
    min_N: 350          # v1 +10pp rebind (true >=95%); own requirement ~143, held at the 350 floor
    strata: [support_label, prompt_family, source_family]
    MDE_pp: 10
    CI_method: wilson_95
    ship_gate_family: sft_ship

  - split: eval_usage_weighted_headline
    metric: supported_prompt_to_lut_pass_rate
    gate: "Wilson 95% lower bound >= 60%"
    min_N: 350          # v1 +10pp rebind: true >=70% clears 60% at 80% power under Holm (computed 325)
    strata: [source_family, style_bucket, usage_prior_bucket]
    MDE_pp: 10
    CI_method: wilson_95
    ship_gate_family: sft_ship

  - split: eval_usage_weighted_headline
    metric: supported_prompt_to_lut_pass_rate_vs_best_null
    gate: "paired-bootstrap 95% lower bound >= +30pp"
    min_paired_N: 350   # v1: +30pp margin needs far fewer; shares the 350 headline floor
    strata: [source_family, style_bucket, usage_prior_bucket]
    MDE_pp: 30
    CI_method: stratified_paired_bootstrap_95
    ship_gate_family: sft_ship

  - split: eval_usage_weighted_headline
    metric: supported_prompt_to_lut_pass_rate_vs_best_constant
    gate: "paired-bootstrap 95% lower bound >= +20pp"
    min_paired_N: 350   # v1: +20pp margin needs far fewer; shares the 350 headline floor
    strata: [source_family, style_bucket, usage_prior_bucket]
    MDE_pp: 20
    CI_method: stratified_paired_bootstrap_95
    ship_gate_family: sft_ship

  - split: eval_usage_weighted_headline
    metric: supported_prompt_to_lut_pass_rate_vs_deterministic_renderer
    gate: "paired-bootstrap 95% lower bound >= +10pp"
    min_paired_N: 350   # v1 +10pp rebind (was +5pp/800); ~306 at pi_d=0.35 under Holm, held at 350
    strata: [source_family, style_bucket, usage_prior_bucket]
    MDE_pp: 10
    CI_method: stratified_paired_bootstrap_95
    ship_gate_family: sft_ship

  - split: eval_usage_weighted_headline
    metric: unsupported_recall
    gate: "Wilson 95% lower bound >= 80%"
    min_N: 200
    strata: [unsupported_category, prompt_family]
    MDE_pp: 5
    CI_method: wilson_95
    ship_gate_family: sft_ship

  - split: eval_usage_weighted_headline
    metric: unsupported_precision
    gate: "Wilson 95% lower bound >= 80%"
    min_N: 200
    strata: [unsupported_category, prompt_family]
    MDE_pp: 5
    CI_method: wilson_95
    ship_gate_family: sft_ship

  - split: eval_usage_weighted_headline
    metric: over_refusal_rate
    gate: "Wilson 95% upper bound <= 10%"
    min_N: 350          # v1 coarsened: MDE 5->6, so a true <=4% over-refusal clears the 10% ceiling
    strata: [source_family, style_bucket, usage_prior_bucket]   # (needs 289 at 80% power, held at 350 floor)
    MDE_pp: 6
    CI_method: wilson_95
    ship_gate_family: sft_ship

  - split: eval_usage_weighted_headline
    metric: over_refusal_rate_vs_deterministic_renderer
    gate: diagnostic   # v1: paired +/-2pp needs ~2400-7600 rows; not powerable at v1 scale. Measured
                       # and reported, but not ship-gated. Restore as sft_ship when supply allows.
    min_paired_N: 800
    strata: [source_family, style_bucket, usage_prior_bucket]
    MDE_pp: 2
    CI_method: stratified_paired_bootstrap_95
    ship_gate_family: diagnostic
    underpowered_behavior: diagnostic-unless-target-quality-gate-predeclared

  - split: eval_usage_weighted_headline
    metric: safety_failure_rate_vs_deterministic_renderer
    gate: diagnostic   # v1: paired +/-2pp needs ~2400-7600 rows. Replaced as the v1 safety
                       # ship-gate by the ABSOLUTE safety_failure_rate bound below (cheap to power).
    min_paired_N: 800
    strata: [source_family, style_bucket, usage_prior_bucket]
    MDE_pp: 2
    CI_method: stratified_paired_bootstrap_95
    ship_gate_family: diagnostic
    underpowered_behavior: diagnostic-unless-target-quality-gate-predeclared

  - split: eval_usage_weighted_headline
    metric: safety_failure_rate          # ABSOLUTE v1 safety ship-gate (not differenced vs a baseline,
    gate: "Wilson 95% upper bound <= 5%" # so it is cheap to power). Fraction of model outputs failing
    min_N: 350                           # the safety gates. Needs 303 rows to certify a true <=1% rate
    strata: [source_family, style_bucket, usage_prior_bucket]  # at 80% power under Holm(m=15); passing
    MDE_pp: 4                            # therefore implies ~<=1% unsafe, though the nominal bar is 5%.
    CI_method: wilson_95
    ship_gate_family: sft_ship

  - split: eval_unsupported_mixed
    metric: mixed_unsupported_recall
    gate: "Wilson 95% lower bound >= 80%"
    min_N: 100
    strata: [unsupported_category, supported_component]
    MDE_pp: 5
    CI_method: wilson_95
    ship_gate_family: sft_ship

  - split: eval_boundary_pairs
    metric: boundary_f1
    gate: "Wilson/bootstrap 95% lower bound >= 80%"
    min_paired_N: 100
    strata: [boundary_type, supported_component, unsupported_component]
    MDE_pp: 5
    CI_method: paired_bootstrap_95
    ship_gate_family: sft_ship
    underpowered_behavior: not-evaluable-below-min_paired_N

  - split: eval_boundary_pairs
    metric: near_boundary_pair_accuracy
    gate: "Wilson/bootstrap 95% lower bound >= 85%"
    min_paired_N: 100
    strata: [boundary_type, supported_component, unsupported_component]
    MDE_pp: 5
    CI_method: paired_bootstrap_95
    ship_gate_family: sft_ship
    underpowered_behavior: not-evaluable-below-min_paired_N

  - split: eval_image_sensitivity
    metric: supported_prompt_to_lut_pass_rate_vs_prompt_only_image_blind
    gate: "paired-bootstrap 95% lower bound >= +10pp"
    min_N: 300
    min_paired_N: 100
    strata: [image_conditioning_group_id, source_family, behavior_bucket]
    MDE_pp: 10
    CI_method: grouped_stratified_paired_bootstrap_95
    ship_gate_family: sft_ship

  - split: eval_image_sensitivity
    metric: supported_prompt_to_lut_pass_rate_vs_blank_image
    gate: "paired-bootstrap 95% lower bound > 0pp"
    min_N: 300
    min_paired_N: 100
    strata: [image_conditioning_group_id, source_family, behavior_bucket]
    MDE_pp: 0
    CI_method: grouped_stratified_paired_bootstrap_95
    ship_gate_family: sft_ship

  - split: eval_image_sensitivity
    metric: supported_prompt_to_lut_pass_rate_vs_shuffled_image
    gate: "paired-bootstrap 95% lower bound > 0pp"
    min_N: 300
    min_paired_N: 100
    strata: [image_conditioning_group_id, source_family, behavior_bucket]
    MDE_pp: 0
    CI_method: grouped_stratified_paired_bootstrap_95
    ship_gate_family: sft_ship

  - split: eval_subtle_control
    metric: supported_prompt_to_lut_pass_rate_vs_deterministic_renderer
    gate: "paired-bootstrap 95% lower bound >= 0pp"
    min_paired_N: 150
    strata: [attribute, magnitude_bucket]
    MDE_pp: 0
    CI_method: stratified_paired_bootstrap_95
    ship_gate_family: sft_ship_renderer_hard_or_group

  - split: eval_style_discriminability
    metric: supported_prompt_to_lut_pass_rate_vs_deterministic_renderer
    gate: "paired-bootstrap 95% lower bound >= 0pp"
    min_paired_N: 150
    per_style_min_N: 30
    strata: [style]
    MDE_pp: 0
    CI_method: stratified_paired_bootstrap_95
    ship_gate_family: sft_ship_renderer_hard_or_group

  - split: [eval_subtle_control, eval_style_discriminability]
    metric: renderer_hard_or_group_delta
    gate: "paired-bootstrap 95% lower bound on at least one member split >= +5pp after multiplicity adjustment"
    min_paired_N: 150
    strata: [split, attribute_or_style]
    MDE_pp: 5
    CI_method: stratified_paired_bootstrap_95
    ship_gate_family: sft_ship_renderer_hard_or_group

  - split: eval_real_world_cli_inputs
    metric: product_robustness_report
    gate: diagnostic
    min_N: 100
    strata: [input_file_type, compression_bucket, color_profile_bucket, size_bucket]
    MDE_pp: null
    CI_method: wilson_95
    ship_gate_family: diagnostic
    underpowered_behavior: diagnostic-unless-target-quality-gate-predeclared

  # ============================================================================================
  # ADR 0024 — decoder-free OOD / refuse / interpreter slices (SCAFFOLD, provisional)
  # ============================================================================================
  # These are the AUDIT §11 decoder-free slices the eval-honesty contract makes contractual
  # (unseen-wording, named/nonce concept, counterfactual-ranking, paraphrase-consistency, refuse
  # {out-of-scope, out-of-gamut}, in-distribution regression) + the interpreter metrics
  # (attribute-F1, route-accuracy, over-refusal). tier=NOW means SLM/interpreter forward pass only
  # (no frozen decoder). They are declared here now so every later change is falsifiable, but the
  # DATASETS that back them are built in later phases and the slices are NOT ship-gated until
  # frozen: true is set at eval-set freeze:
  #   * refuse_* / mixed          -> P2 (portable unsupported staging + out_of_gamut/clarify taxonomy)
  #   * attribute_f1/route/over   -> P5 (interpreter distillation + decoder-free adapter)
  #   * wording/concept/cf/parap  -> P5/P7 (held-out concept suites + two-stage integration)
  # Build order (AUDIT §11): in_distribution_regression -> unseen_wording -> named+nonce concept
  # -> counterfactual_ranking -> paraphrase_consistency. Leakage controls: group/hold out by
  # split_unit_id & LUT-neighbor, source pack, image identity, prompt template, teacher model,
  # generation batch, concept/title family, procedural generator family.

  - split: eval_in_distribution_regression
    metric: holdout_token_accuracy
    gate: "unit-clustered bootstrap 95% lower bound within -2pp of the frozen baseline"
    min_N: 100
    strata: [source_family]
    MDE_pp: 2
    CI_method: unit_clustered_bootstrap_95
    tier: NOW
    ship_gate_family: sft_ship
    status: scaffold          # baseline frozen once the unit-aware holdout is scored on Colab (P1)
    data_source: "sft.score_tokens overall micro accuracy on the unit-aware holdout (ADR 0024)"

  - split: eval_unseen_wording
    metric: unseen_wording_valid_token_rate
    gate: "Wilson 95% lower bound >= 85% AND >= in-distribution accuracy - 5pp"
    min_N: 100
    strata: [generator_family, wording_family, source_family]
    MDE_pp: 5
    CI_method: wilson_95
    tier: NOW
    ship_gate_family: diagnostic
    status: scaffold          # P5/P7: paraphrase set, generator+wording family held out

  - split: eval_named_concept
    metric: named_concept_component_match_rate
    gate: "Wilson 95% lower bound >= 70% (component attributes present, concept term absent from SFT)"
    min_N: 100
    strata: [concept_family, source_family]
    MDE_pp: 5
    CI_method: wilson_95
    tier: NOW
    ship_gate_family: diagnostic
    status: scaffold          # P7: Mars / sodium-vapor / oxidized-copper style held-out concepts

  - split: eval_nonce_concept
    metric: nonce_concept_component_match_rate
    gate: "Wilson 95% lower bound >= 70% (invented term defined in-context; tests decomposition vs recall)"
    min_N: 100
    strata: [concept_family]
    MDE_pp: 5
    CI_method: wilson_95
    tier: NOW
    ship_gate_family: diagnostic
    status: scaffold          # P7: 'Varellian = muted violet shadows + amber highlights' style probes

  - split: eval_counterfactual_ranking
    metric: counterfactual_ranking_margin
    gate: "paired-bootstrap 95% lower bound > 0 (correct-target NLL < structured-wrong-target NLL)"
    min_paired_N: 100
    strata: [counterfactual_type, source_family]
    MDE_pp: 0
    CI_method: paired_bootstrap_95
    tier: NOW
    ship_gate_family: diagnostic
    status: scaffold          # P5/P7: opposite-sign / missing-component / excess-magnitude negatives

  - split: eval_paraphrase_consistency
    metric: paraphrase_group_consistency
    gate: "Wilson 95% lower bound >= 80% (same behavior/LUT invariant across wordings)"
    min_N: 100
    strata: [paraphrase_group_id, source_family]
    MDE_pp: 5
    CI_method: wilson_95
    tier: NOW
    ship_gate_family: diagnostic
    status: scaffold          # P5/P7: grouped by LUT unit, split by generator/template/lexicon

  - split: eval_refuse_out_of_scope
    metric: refuse_out_of_scope_recall
    gate: "Wilson 95% lower bound >= 80% (non-global/local/content requests refused, not silently graded)"
    min_N: 200
    strata: [unsupported_category, prompt_family]
    MDE_pp: 5
    CI_method: wilson_95
    tier: NOW
    ship_gate_family: sft_ship
    status: scaffold          # P2: portable unsupported staging so the 272 refusal rows train

  - split: eval_refuse_out_of_gamut
    metric: refuse_out_of_gamut_recall
    gate: "Wilson 95% lower bound >= 80% (infrared / pure-primary / large-hue-rotation refused per the materialization gate)"
    min_N: 100
    strata: [out_of_gamut_kind]
    MDE_pp: 5
    CI_method: wilson_95
    tier: NOW
    ship_gate_family: sft_ship
    status: scaffold          # P2: out_of_gamut refuse_reason mirrors materialize_target_tokens gate

  - split: eval_interpreter
    metric: attribute_f1
    gate: "macro attribute-F1 >= 0.70 (requested axes vs measured behavior_v2 axes)"
    min_N: 150
    strata: [axis_group, route]
    MDE_pp: 5
    CI_method: wilson_95
    tier: NOW
    ship_gate_family: diagnostic
    status: scaffold          # P5: interpreter distillation eval (attribute-set F1)

  - split: eval_interpreter
    metric: route_accuracy
    gate: "Wilson 95% lower bound >= 85% over {grade, clarify, refuse}"
    min_N: 150
    strata: [route]
    MDE_pp: 5
    CI_method: wilson_95
    tier: NOW
    ship_gate_family: diagnostic
    status: scaffold          # P5: route classification accuracy

  - split: eval_interpreter
    metric: interpreter_over_refusal_rate
    gate: "Wilson 95% upper bound <= 10% (in-scope, representable requests not spuriously refused)"
    min_N: 150
    strata: [source_family]
    MDE_pp: 6
    CI_method: wilson_95
    tier: NOW
    ship_gate_family: diagnostic
    status: scaffold          # P5: over-refusal on supported/representable prompts
